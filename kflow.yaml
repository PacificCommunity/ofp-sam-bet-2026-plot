name: ofp-sam-bet-2026-plot
description: Build report-ready BET 2026 plots from stepwise model payloads.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/tuna-flow:v1.5
resources:
  cpus: 2
  memory: 12GB
  disk: 8GB
env:
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: auto
  KFLOW_RUNTIME_PACKAGES: mfclshiny=PacificCommunity/mfclshiny@36bb10e
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  PLOT_OPTIMIZE_FIGURES: "true"
output_patterns:
  - outputs/**
triggers:
  on_success:
    - key: report-from-plot
      report: ofp-sam-bet-2026-report
      input_jobs:
        - "{{ job.id }}"
      env:
        FLOW_GROUP: "{{ job.config.FLOW_GROUP }}"
        JOB_TITLE: BET report from plots
        RUN_LABEL: "report-from-{{ job.id }}"
        KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
        KFLOW_RUNTIME_UPDATE: auto
        KFLOW_RUNTIME_PACKAGES: mfclshiny=PacificCommunity/mfclshiny@36bb10e
        KFLOW_RUNTIME_GITHUB_AUTH: "true"
        KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
        PLOT_OPTIMIZE_FIGURES: "true"
      tags:
        auto: "true"
        stage: report
job_config:
  optional:
    - RUN_LABEL
    - JOB_TITLE
    - FLOW_GROUP
    - PLOT_TITLE
    - FLOW_SPECIES
    - FLOW_SPECIES_LABEL
    - FLOW_ASSESSMENT_YEAR
    - KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES
    - KFLOW_RUNTIME_UPDATE
    - KFLOW_RUNTIME_PACKAGES
    - KFLOW_RUNTIME_GITHUB_AUTH
    - KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME
    - PLOT_OPTIMIZE_FIGURES
